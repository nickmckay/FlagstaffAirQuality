name: Fit local calibration

on:
  schedule:
    - cron: "17 9 * * 1"   # weekly, Monday 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aq-data
  cancel-in-progress: false

jobs:
  fit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore data (data branch)
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fit calibration
        run: python scripts/fit_calibration.py

      - name: Fit variogram
        run: python scripts/fit_variogram.py

      # Frames pick up the new coefficients on the next 15-minute update run.
      - name: Publish data branch
        run: |
          cd data
          rm -rf .git
          git init -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "calibration refit $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data
