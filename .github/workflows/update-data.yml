name: Update air quality data

on:
  schedule:
    # offset from :00/:15/:30/:45 — GitHub's scheduler drops jobs most at
    # round marks; missed slots self-heal via the history API anyway
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

# The data branch is rewritten each run; never let two runs race on it.
concurrency:
  group: aq-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore previous data (data branch)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and process data
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
          AQE_API_KEY: ${{ secrets.AQE_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Publish data branch
        run: |
          cd data
          rm -rf .git
          git init -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data update $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data

      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp index.html _site/
          cp -r css js _site/
          cp data/*.json _site/data/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
